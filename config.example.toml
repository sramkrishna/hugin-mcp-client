# Hugin MCP Client Configuration
# Copy this file to config.toml and edit for your setup

# LLM Provider Configuration
[llm]
# Provider: "anthropic", "vllm", "openai", or "ollama"
provider = "anthropic"

# Token Management Settings
# max_result_length = 10000  # Max chars for tool results (default: 10000)
#                             # Longer results are compressed to save tokens
#                             # Lower values save tokens but may cause hallucination
# enable_caching = true       # Enable Anthropic prompt caching (default: true)
#                             # Reduces costs by caching tool definitions

# For Anthropic (Claude) - Best tool calling support:
# Set ANTHROPIC_API_KEY environment variable
# model = "claude-sonnet-4-20250514"  # Optional, defaults to claude-sonnet-4

# For vLLM (native in-process, no server needed) - Excellent for local:
# provider = "vllm"
# model = "meta-llama/Meta-Llama-3.1-8B-Instruct"
# tensor_parallel_size = 1  # Number of GPUs
# gpu_memory_utilization = 0.9  # Fraction of GPU memory to use
# Install with: pip install 'hugin-mcp-client[vllm]'

# For OpenAI (or local OpenAI-compatible servers) - Good tool calling:
# provider = "openai"
# model = "gpt-4"  # Or your local model name
# api_key = "sk-..."  # Or set OPENAI_API_KEY env var
# For local servers (LM Studio, vLLM server, llama.cpp, LocalAI):
# base_url = "http://localhost:1234/v1"  # LM Studio default
# api_key can be anything for local servers

# For Ollama (local models) - Limited tool calling support:
# provider = "ollama"
# model = "mistral"  # Or "llama3.2", "qwen3-coder", etc.
# base_url = "http://localhost:11434"  # Optional, defaults to localhost:11434

# MCP Server configurations
# Each server needs a command and optional arguments

# Example: Ratatoskr MCP server (GNOME Desktop integration)
# Provides tools to query GNOME Shell version, desktop environment info, etc.
# [servers.ratatoskr]
# command = "python3.13"
# args = ["/path/to/ratatoskr-mcp-server/src/ratatoskr_mcp_server/server.py"]
# Or if installed: command = "ratatoskr-mcp-server"

# Example: Filesystem MCP server (using uvx to auto-install)
# [servers.filesystem]
# command = "uvx"
# args = ["mcp-server-filesystem", "/path/to/workspace"]

# Example: Official MCP servers via npx
# [servers.fetch]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-fetch"]

# Example: Locally installed server executable
# [servers.my_server]
# command = "my-mcp-server"  # Must be in PATH
# args = ["--workspace", "/path/to/workspace"]

# Gmail IMAP — email access for the dashboard agent
# Uses App Passwords — no Google Cloud Console needed.
#
# Steps to set up:
#   1. Enable 2FA on your Google account (required for app passwords)
#   2. Visit https://myaccount.google.com/apppasswords
#   3. Generate a 16-character app password for "Mail"
#   4. Put your email + that password in [dashboard] below
#
# For calendar events with Gmail, you'll need either:
#   - Evolution + Ratatoskr connected to the same account, or
#   - Google Calendar MCP server (requires Cloud Console OAuth)
#
# [servers.gmail]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-gmail"]

# Google Calendar MCP server (optional, Cloud Console OAuth)
# [servers.gcal]
# command = "npx"
# args = ["-y", "@googleapis/calendar-mcp-server"]

# ---------------------------------------------------------------------------
# Personal Dashboard Agent  —  hugin-dashboard
#
# Runs 2x/day (via systemd timer), gathers recent email and calendar events,
# extracts action items, tracks new contacts, and pushes a condensed briefing
# to your phone via Telegram.
#
# Two data backends:
#   ratatoskr  — Evolution Data Server (email + calendar + tasks)
#                Full featured, requires Evolution configured locally
#   gmail      — Gmail IMAP with App Passwords (email only)
#                Calendar needs separate setup
# ---------------------------------------------------------------------------
[dashboard]

# Data backend: "ratatoskr" (default) or "gmail"
backend = "ratatoskr"

# Gmail IMAP settings (used when backend = "gmail")
# Generate App Passwords at https://myaccount.google.com/apppasswords
# Supports multiple accounts — all inboxes are merged into one briefing.
#
# [[dashboard.gmail_accounts]]
# user = "sri@stoneandkey.consulting"
# app_password = "xxxx xxxx xxxx xxxx"
#
# [[dashboard.gmail_accounts]]
# user = "sri@ramkrishna.me"
# app_password = "yyyy yyyy yyyy yyyy"

# Telegram notification settings (optional)
# If set, the briefing is pushed to your phone + desktop Telegram.
# Steps:
#   1. Talk to @BotFather on Telegram → create a bot → get token
#   2. Message your bot (just say "hi")
#   3. Visit https://api.telegram.org/bot<TOKEN>/getUpdates
#      to find your chat_id (look for "chat":{"id": 12345})
#   4. Uncomment the two lines below
#
# telegram_token = "1234567890:ABCdef..."
# telegram_chat_id = "233634147"
